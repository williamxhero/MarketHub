<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MarketHub / QuoteMux</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #18212b;
      background: #f5f6f8;
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
    }

    main {
      display: grid;
      gap: 28px;
      justify-items: center;
      width: min(100% - 32px, 560px);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      line-height: 1.2;
      font-weight: 760;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid #d8dee8;
      background: #ffffff;
      color: #18212b;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }

    a:first-child {
      border-color: #1f6feb;
      background: #1f6feb;
      color: #ffffff;
    }

    a:hover {
      border-color: #164ea6;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 30px;
      }

      nav,
      a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>MarketHub / QuoteMux</h1>
    <nav aria-label="主要入口">
      <a href="/api/openapi">API 文档</a>
      <a href="/admin">管理后台</a>
    </nav>
  </main>
</body>
</html>
